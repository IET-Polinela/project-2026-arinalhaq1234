{% extends 'base.html' %}
{% block title %}Hapus Laporan{% endblock %}

{% block content %}

<!-- Breadcrumb -->
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
            <a href="{% url 'report_list' %}">Home</a>
        </li>
        <li class="breadcrumb-item">
            <a href="{% url 'report_list' %}">Reports</a>
        </li>
        <li class="breadcrumb-item active" aria-current="page">
            Hapus
        </li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

        <div class="card shadow-sm border-danger">
            <div class="card-body text-center p-4">

                <h3 class="text-danger mb-3">Konfirmasi Hapus</h3>

                <p class="mb-2">
                    Apakah kamu yakin ingin menghapus laporan berikut?
                </p>

                <h5 class="fw-bold">{{ object.title }}</h5>

                <form method="post" class="mt-4">
                    {% csrf_token %}

                    <button type="submit" class="btn btn-danger">
                        Ya, Hapus
                    </button>

                    <a href="{% url 'report_list' %}" class="btn btn-secondary">
                        Batal
                    </a>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
