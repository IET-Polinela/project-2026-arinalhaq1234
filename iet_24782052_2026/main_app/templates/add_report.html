{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Form Laporan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #3a5bdc, #4a6cf7);
        }

        .form-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-top: 50px;
        }

        .navbar-custom {
            background-color: transparent;
        }

        .navbar-brand {
            font-weight: bold;
            color: white !important;
        }

        .nav-link {
            color: white !important;
        }

        h2 {
            color: white;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #3a5bdc;
            border: none;
        }
    </style>
</head>

<body>

<!-- 🔷 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="navbar-brand" href="#">📢 Punggur Smart City</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="/">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/">Laporan</a>
            </li>
        </ul>
    </div>
</nav>

<!-- 🔷 TITLE -->
<div class="container text-center">
    <h2 class="mt-4">FORM LAPORAN PENGADUAN</h2>
</div>

<!-- 🔷 FORM -->
<div class="container">
    <div class="form-container shadow">

        <form method="post">
            {% csrf_token %}

            <!-- Judul -->
            <div class="mb-3">
                <label class="form-label">Judul Laporan</label>
                {{ form.title }}
            </div>

            <!-- Kategori -->
            <div class="mb-3">
                <label class="form-label">Kategori</label>
                {{ form.category }}
            </div>

            <!-- Deskripsi -->
            <div class="mb-3">
                <label class="form-label">Deskripsi</label>
                {{ form.description }}
            </div>

            <!-- Lokasi -->
            <div class="mb-3">
                <label class="form-label">Lokasi</label>
                {{ form.location }}
            </div>

            <!-- Tombol -->
            <button type="submit" class="btn btn-primary w-100">
                Buat Laporan
            </button>

        </form>

    </div>
</div>

</body>
</html>
