{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Punggur City{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-custom {
            background: linear-gradient(90deg, #0d6efd, #0b5ed7);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .nav-link {
            font-weight: 500;
        }

        .landing-wrapper {
            min-height: calc(100vh - 72px);
            background:
                linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)),
                url("{% static 'images/foto.jpg' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 760px;
            width: 100%;
            text-align: center;
            color: white;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
        }

        .hero-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 999px;
            background-color: rgba(255, 255, 255, 0.18);
            font-size: 0.95rem;
            margin-bottom: 18px;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 32px;
        }

        .hero-buttons .btn {
            min-width: 190px;
            padding: 12px 20px;
            border-radius: 14px;
            font-weight: 600;
        }

        .section-card {
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border: none;
        }

        @media (max-width: 768px) {
            .hero-card {
                padding: 32px 20px;
            }

            .hero-title {
                font-size: 2.4rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }

            .hero-buttons {
                flex-direction: column;
            }

            .hero-buttons .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="{% url 'landing' %}">
            <i class="bi bi-buildings-fill me-2"></i>Punggur City
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'landing' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'report_list' %}">Reports</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-3">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'success' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}
</div>

{% block full_content %}{% endblock %}

<div class="container mt-4 mb-4">
    {% block content %}{% endblock %}
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const forms = document.querySelectorAll(".loading-form");

    forms.forEach(function(form) {
        form.addEventListener("submit", function(e) {
            const btn = form.querySelector(".btn-loading");

            if (btn && !form.dataset.submitted) {
                e.preventDefault();
                form.dataset.submitted = "true";

                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Loading...';

                setTimeout(function() {
                    form.submit();
                }, 5000);
            }
        });
    });
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
