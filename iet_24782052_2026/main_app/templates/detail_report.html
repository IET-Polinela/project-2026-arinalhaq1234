<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="mb-3">{{ report.title }}</h2>

        <p><b>Kategori:</b> {{ report.category }}</p>
        <p><b>Deskripsi:</b> {{ report.description }}</p>
        <p><b>Lokasi:</b> {{ report.location }}</p>
        <p><b>Status:</b> <span class="badge bg-success">{{ report.status }}</span></p>

        <a href="/" class="btn btn-secondary mt-3">Kembali</a>
    </div>

</div>
