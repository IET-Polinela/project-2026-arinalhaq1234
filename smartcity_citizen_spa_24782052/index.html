<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart City Citizen Portal</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background: #f4f7fb;
        }

        .navbar {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
        }

        .brand-icon {
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.18);
        }

        .page-card {
            border: none;
            border-radius: 22px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        .login-card {
            max-width: 460px;
            margin: 70px auto;
        }

        .dashboard-card {
            min-height: 180px;
        }

        .sticky-panel {
            position: sticky;
            top: 24px;
        }

        .status-pill {
            display: inline-block;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .status-draft {
            color: #111827;
            background: #e5e7eb;
        }

        .status-reported {
            color: #1d4ed8;
            background: #dbeafe;
        }

        .status-verified {
            color: #166534;
            background: #dcfce7;
        }

        .status-progress {
            color: #92400e;
            background: #fef3c7;
        }

        .status-resolved {
            color: #047857;
            background: #d1fae5;
        }

        .top-nav-link {
            display: inline-block;
            padding: 8px 2px;
            border: none;
            color: rgba(255, 255, 255, 0.9);
            background: transparent;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
        }

        .top-nav-link:hover {
            color: #ffffff;
        }

        .profile-dropdown-btn {
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.18);
        }

        .profile-avatar {
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
        }

        .profile-menu {
            min-width: 240px;
            padding: 10px;
            border: none;
            border-radius: 18px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.14);
        }

        .profile-menu-header {
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 14px;
            background: #f8f9fa;
        }

        .small-label {
            color: #6c757d;
            font-size: 0.8rem;
        }

        .username {
            color: #212529;
            font-weight: 700;
        }

        .progress {
            height: 18px;
        }

        @media (max-width: 991px) {
            .sticky-panel {
                position: static;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#dashboard">
                <span class="brand-icon">
                    <i class="bi bi-buildings-fill"></i>
                </span>

                Smart City Citizen Portal
            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navMenu"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div id="navMenu" class="collapse navbar-collapse">
                <div class="ms-auto d-flex gap-4 align-items-center flex-wrap">
                    <a href="#dashboard" class="top-nav-link">
                        Dashboard
                    </a>

                    <button
                        type="button"
                        class="top-nav-link"
                        onclick="openCreateReportModal()"
                    >
                        Tambah Laporan
                    </button>

                    <div id="userDropdownWrapper" class="dropdown d-none">
                        <button
                            class="btn profile-dropdown-btn"
                            type="button"
                            data-bs-toggle="dropdown"
                        >
                            <span class="profile-avatar">
                                <i class="bi bi-person-fill"></i>
                            </span>
                        </button>

                        <ul class="dropdown-menu dropdown-menu-end profile-menu">
                            <li>
                                <div class="profile-menu-header">
                                    <div class="small-label">
                                        Login sebagai
                                    </div>

                                    <div id="dropdownUsername" class="username">
                                        Citizen
                                    </div>
                                </div>
                            </li>

                            <li>
                                <button
                                    id="logoutBtn"
                                    type="button"
                                    class="dropdown-item text-danger"
                                >
                                    <i class="bi bi-box-arrow-right me-2"></i>
                                    Logout
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4">
        <div id="app-content"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
