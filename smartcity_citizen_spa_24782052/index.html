<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Portal | Punggur City</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #f4f7fb;
        }

        .navbar {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
        }

        .brand-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: rgba(255,255,255,0.18);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
        }

        .page-card {
            border: none;
            border-radius: 22px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }

        .login-card {
            max-width: 460px;
            margin: 70px auto;
        }

        .dashboard-card {
            min-height: 180px;
        }

        .sticky-panel {
            position: sticky;
            top: 24px;
        }

        .status-pill {
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .status-draft {
            background: #e5e7eb;
            color: #111827;
        }

        .status-reported {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .status-verified {
            background: #dcfce7;
            color: #166534;
        }

        .status-progress {
            background: #fef3c7;
            color: #92400e;
        }

        .status-resolved {
            background: #d1fae5;
            color: #047857;
        }

        .top-nav-link {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            padding: 8px 2px;
            position: relative;
            transition: 0.2s ease-in-out;
            display: inline-block;
        }

        .top-nav-link:hover {
            color: #ffffff;
        }

        .top-nav-link.active {
            color: #ffffff;
        }

        .top-nav-link.active::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 100%;
            height: 3px;
            border-radius: 999px;
            background: #ffffff;
        }

        .profile-dropdown-btn {
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.18);
            color: #ffffff;
            border-radius: 999px;
            padding: 6px;
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: 0.2s ease-in-out;
        }

        .profile-dropdown-btn:hover,
        .profile-dropdown-btn:focus,
        .profile-dropdown-btn.show {
            background: rgba(255, 255, 255, 0.26);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.35);
        }

        .profile-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .profile-name {
            display: none;
        }

        .profile-menu {
            min-width: 240px;
            border: none;
            border-radius: 18px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.14);
            padding: 10px;
        }

        .profile-menu-header {
            padding: 10px 12px;
            border-radius: 14px;
            background: #f8f9fa;
            margin-bottom: 8px;
        }

        .profile-menu-header .small-label {
            font-size: 0.8rem;
            color: #6c757d;
            margin-bottom: 2px;
        }

        .profile-menu-header .username {
            font-weight: 700;
            color: #212529;
        }

        .dropdown-item.custom-item {
            border-radius: 12px;
            padding: 10px 12px;
            font-weight: 500;
        }

        .dropdown-item.custom-item:hover {
            background: #f1f5ff;
        }

        @media (max-width: 991px) {
            .sticky-panel {
                position: static;
            }

            .top-nav-area {
                margin-top: 14px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#dashboard">
                <span class="brand-icon">
                    <i class="bi bi-buildings-fill"></i>
                </span>
                Smart City Citizen Portal
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div id="navMenu" class="collapse navbar-collapse">
                <div class="ms-auto d-flex gap-4 align-items-center flex-wrap top-nav-area">
                    <a id="dashboardNavLink" href="#dashboard" class="top-nav-link">Dashboard</a>
                    <a id="createReportNavLink" href="#create-report" class="top-nav-link">Tambah Laporan</a>

                    <div id="userDropdownWrapper" class="dropdown d-none">
                        <button
                            class="btn profile-dropdown-btn"
                            type="button"
                            id="userDropdownButton"
                            data-bs-toggle="dropdown"
                            aria-expanded="false"
                        >
                            <span class="profile-avatar">
                                <i class="bi bi-person-fill"></i>
                            </span>
                            <span id="navbarUsername" class="profile-name">Citizen</span>
                        </button>

                        <ul class="dropdown-menu dropdown-menu-end profile-menu" aria-labelledby="userDropdownButton">
                            <li>
                                <div class="profile-menu-header">
                                    <div class="small-label">Login sebagai</div>
                                    <div id="dropdownUsername" class="username">Citizen</div>
                                </div>
                            </li>

                            <li>
                                <a href="#dashboard" class="dropdown-item custom-item">
                                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                                </a>
                            </li>

                            <li>
                                <a href="#create-report" class="dropdown-item custom-item">
                                    <i class="bi bi-plus-circle me-2"></i>Tambah Laporan
                                </a>
                            </li>

                            <li><hr class="dropdown-divider"></li>

                            <li>
                                <button id="logoutBtn" class="dropdown-item custom-item text-danger" type="button">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4">
        <div id="app-content"></div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
